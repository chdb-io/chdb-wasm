<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>chDB SQL Shell</title>
<style>
  /* ---- Theme tokens (dark default, light overrides) ---- */
  :root {
    --bg: #0b0b0b;
    --surface: #161616;
    --text: #e6e6e6;
    --muted: #8a8a8a;
    --border: #2a2a2a;
    --accent-text: #FAFF69;
    --strong-text: #FFCC00;
    --accent-fill: #FAFF69;
    --accent-fill-hover: #FFCC00;
    --on-accent: #0b0b0b;
    --error: #ff7a7a;
    --sel: rgba(250, 255, 105, 0.22);
    --caret: rgba(250, 255, 105, 0.85);
    --mono: "SFMono-Regular", Menlo, Consolas, "Liberation Mono", monospace;
  }
  :root[data-theme="light"] {
    --bg: #ffffff;
    --surface: #f5f5f3;
    --text: #1f2328;
    --muted: #6b7280;
    --border: #e5e7eb;
    --accent-text: #8a6d00;
    --strong-text: #6b5200;
    --accent-fill: #FFD000;
    --accent-fill-hover: #FFC400;
    --on-accent: #1f2328;
    --error: #b42318;
    --sel: #fff1a8;
    --caret: rgba(138, 109, 0, 0.55);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 14px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
    transition: background 160ms ease, color 160ms ease;
  }

  ::selection { background: var(--sel); }

  /* ---------- Header / Toolbar ---------- */
  header.toolbar {
    position: relative;
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    height: 46px;
    padding: 0 14px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    user-select: none;
  }
  .group { display: flex; align-items: center; gap: 10px; flex: 0 0 auto; }
  .title {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    font-size: 14px;
    letter-spacing: 0.04em;
    white-space: nowrap;
    pointer-events: none;
  }
  .title .accent { color: var(--accent-text); font-weight: 700; }
  .title .rest { color: var(--muted); }

  button.btn {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.02em;
    padding: 7px 15px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 120ms ease, border-color 120ms ease, transform 60ms ease, box-shadow 120ms ease;
    line-height: 1;
  }
  button.btn:active { transform: translateY(1px); }
  button.btn:focus-visible { outline: 2px solid var(--accent-text); outline-offset: 2px; }
  button.btn-primary { background: var(--accent-fill); color: var(--on-accent); border: 1px solid var(--accent-fill); }
  button.btn-primary:hover { background: var(--accent-fill-hover); border-color: var(--accent-fill-hover); }
  button.btn-secondary { background: transparent; color: var(--accent-text); border: 1px solid var(--accent-text); }
  button.btn-secondary:hover { background: var(--sel); }

  /* ---------- Examples dropdown ---------- */
  header.toolbar { z-index: 30; }   /* keep the menu above the terminal */
  .examples-wrap { position: relative; display: inline-flex; }
  .examples-menu {
    position: absolute;
    top: calc(100% + 6px);
    left: 0;
    min-width: 320px;
    max-width: min(78vw, 600px);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 6px;
    box-shadow: 0 12px 32px rgba(0, 0, 0, 0.38);
  }
  .examples-menu.hide { display: none; }
  .ex-group {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 9px 10px 3px;
  }
  .ex-group:first-child { padding-top: 4px; }
  button.example-item {
    display: flex;
    flex-direction: column;
    gap: 2px;
    align-items: flex-start;
    width: 100%;
    text-align: left;
    background: transparent;
    border: 0;
    border-radius: 7px;
    padding: 8px 10px;
    cursor: pointer;
    transition: background 100ms ease;
  }
  button.example-item:hover, button.example-item:focus-visible { background: var(--sel); outline: none; }
  .ex-title { font-family: var(--mono); font-size: 12.5px; font-weight: 600; color: var(--text); }
  button.example-item:hover .ex-title { color: var(--accent-text); }
  .ex-sql {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    max-width: 100%;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  button.icon-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 34px; height: 32px;
    padding: 0;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    cursor: pointer;
    transition: background 120ms ease, border-color 120ms ease;
  }
  button.icon-btn:hover { background: var(--sel); border-color: var(--accent-text); }
  button.icon-btn:focus-visible { outline: 2px solid var(--accent-text); outline-offset: 2px; }
  .icon { width: 18px; height: 18px; display: none; }
  :root[data-theme="dark"] .icon-sun { display: inline-block; }
  :root[data-theme="light"] .icon-moon { display: inline-block; }

  /* ---------- Terminal ---------- */
  main.terminal {
    flex: 1 1 auto;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 18px 22px 28px;
    cursor: text;
    scrollbar-color: var(--border) transparent;
  }
  main.terminal::-webkit-scrollbar { width: 10px; }
  main.terminal::-webkit-scrollbar-thumb { background: var(--border); border-radius: 8px; }
  main.terminal::-webkit-scrollbar-track { background: transparent; }

  .scrollback { white-space: pre-wrap; word-break: break-word; }
  .line { white-space: pre-wrap; word-break: break-word; }

  .banner .accent { color: var(--accent-text); font-weight: 600; }
  .muted-line, .banner .muted { color: var(--muted); }
  .error-line { color: var(--error); }
  .ok-line { color: var(--muted); }
  .reg-line { color: var(--strong-text); }

  .input-row { display: flex; align-items: flex-start; gap: 8px; }
  .prompt { color: var(--accent-text); font-weight: 600; flex: 0 0 auto; }
  .echo-block {
    flex: 1 1 auto;
    min-width: 0;
    white-space: pre-wrap;
    word-break: break-word;
    color: var(--text);
  }

  /* Result box: keep alignment (no wrap), scroll horizontally if wide. */
  .result-table { margin: 4px 0 2px; overflow-x: auto; }
  .result-table .line { white-space: pre; word-break: normal; }
  .result-table .col-name { color: var(--strong-text); font-weight: 600; }
  .result-table .col-type { color: var(--muted); }
  .result-table .cell-value { color: var(--text); }

  /* ---------- Active input: visible textarea + a duckdb-style BLOCK caret ---------- */
  .input-field { position: relative; flex: 1 1 auto; min-width: 0; }
  .ta-mirror {
    position: absolute; left: 0; top: 0; z-index: 0;
    width: 100%;
    font: inherit; line-height: inherit;
    white-space: pre-wrap; word-break: break-word;
    visibility: hidden; pointer-events: none;
    margin: 0; padding: 0; border: 0;
  }
  .block-caret {
    position: absolute; z-index: 0;       /* behind the textarea text so the glyph stays readable */
    width: 0.6em; height: 1.2em;
    background: var(--caret);
    pointer-events: none;
    animation: blink 1.05s steps(1, end) infinite;
  }
  .block-caret.hide { display: none; }
  @keyframes blink { 0%, 50% { opacity: 1; } 50.01%, 100% { opacity: 0; } }

  #cmd-input {
    position: relative; z-index: 1;
    display: block; width: 100%;
    border: 0; padding: 0; margin: 0;
    background: transparent;
    color: var(--text);
    font: inherit; line-height: inherit;
    caret-color: transparent;             /* native caret hidden — we draw the block caret */
    white-space: pre-wrap; word-break: break-word;
    overflow: hidden; resize: none; outline: none;
  }
  #cmd-input::selection { background: var(--sel); }

  .visually-hidden {
    position: absolute;
    width: 1px; height: 1px;
    padding: 0; margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border: 0;
  }
</style>
</head>
<body>
  <header class="toolbar">
    <div class="group">
      <button type="button" class="btn btn-primary" id="btn-new">New</button>
      <button type="button" class="btn btn-secondary" id="btn-import">Import</button>
      <input type="file" id="file-picker" class="visually-hidden" aria-hidden="true" tabindex="-1" multiple />
      <div class="examples-wrap">
        <button type="button" class="btn btn-secondary" id="btn-examples" aria-haspopup="true" aria-expanded="false">Examples</button>
        <div class="examples-menu hide" id="examples-menu" role="menu"></div>
      </div>
    </div>
    <div class="title"><span class="accent">chDB</span> <span class="rest">SQL Shell</span></div>
    <div class="group">
      <button type="button" class="icon-btn" id="theme-toggle" aria-label="Toggle light / dark theme" title="Toggle theme">
        <svg class="icon icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
          <circle cx="12" cy="12" r="4"></circle>
          <path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M19.1 4.9l-1.4 1.4M6.3 17.7l-1.4 1.4"></path>
        </svg>
        <svg class="icon icon-moon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
      </button>
    </div>
  </header>

  <main class="terminal" id="terminal" role="region" aria-label="chDB SQL shell terminal">
    <div class="scrollback" id="scrollback" aria-live="polite"></div>

    <div class="input-row" id="input-row" style="display:none">
      <span class="prompt" aria-hidden="true">:)</span>
      <div class="input-field" id="input-field">
        <div class="ta-mirror" id="ta-mirror" aria-hidden="true"></div>
        <div class="block-caret hide" id="block-caret" aria-hidden="true"></div>
        <label class="visually-hidden" for="cmd-input">Enter SQL query</label>
        <textarea id="cmd-input" rows="1" autocomplete="off" autocapitalize="off"
                  autocorrect="off" spellcheck="false" aria-label="Enter SQL query"></textarea>
      </div>
    </div>
  </main>

  <script type="module">
    import { AsyncChdb, selectBundle } from './dist/index.js';

    var MAX_ROWS = 200; // cap rendered rows to keep the DOM light

    var scrollback = document.getElementById("scrollback");
    var terminal = document.getElementById("terminal");
    var input = document.getElementById("cmd-input");
    var inputRow = document.getElementById("input-row");
    var taMirror = document.getElementById("ta-mirror");
    var blockCaret = document.getElementById("block-caret");
    var btnNew = document.getElementById("btn-new");
    var btnImport = document.getElementById("btn-import");
    var btnExamples = document.getElementById("btn-examples");
    var examplesMenu = document.getElementById("examples-menu");
    var filePicker = document.getElementById("file-picker");
    var themeToggle = document.getElementById("theme-toggle");
    var root = document.documentElement;

    var db = null;
    var conn = null;             // active in-memory chDB connection (reopened on New — no wasm reload)
    var busy = false;            // true while (re)connecting or running a query
    var engineState = "loading"; // 'loading' | 'ready' | 'error'
    var engineMsg = "";
    var loadMiB = "";
    var chdbVersion = null;
    var bundleVariant = null;    // 'mt' | 'st' — decides how aggressive the thread settings may be
    var titleEl = null, brandSpan = null, restSpan = null;
    var history = [];
    var historyIndex = -1;
    var draft = "";
    var registered = [];

    // ---------- Theme ----------
    try {
      var savedTheme = localStorage.getItem("chdb-theme");
      if (savedTheme === "light" || savedTheme === "dark") root.setAttribute("data-theme", savedTheme);
    } catch (e) {}
    themeToggle.addEventListener("click", function () {
      var next = root.getAttribute("data-theme") === "light" ? "dark" : "light";
      root.setAttribute("data-theme", next);
      try { localStorage.setItem("chdb-theme", next); } catch (e) {}
    });

    // ---------- Helpers ----------
    function repeat(ch, n) { var s = ""; for (var i = 0; i < n; i++) s += ch; return s; }
    function tn(t) { return document.createTextNode(t); }
    function scrollToBottom() { terminal.scrollTop = terminal.scrollHeight; }
    function appendBlock(node) { scrollback.appendChild(node); scrollToBottom(); }
    function makeLine(cls) { var el = document.createElement("div"); el.className = "line" + (cls ? " " + cls : ""); return el; }
    function spacerLine() { var s = makeLine(); s.innerHTML = "&nbsp;"; return s; }

    function printLine(text, cls) {
      var block = document.createElement("div");
      var line = makeLine(cls);
      line.textContent = text;
      block.appendChild(line);
      block.appendChild(spacerLine());
      appendBlock(block);
    }

    function printBanner() {
      var wrap = document.createElement("div");
      wrap.className = "banner";
      titleEl = makeLine();
      brandSpan = document.createElement("span");
      restSpan = document.createElement("span");
      titleEl.appendChild(brandSpan);
      titleEl.appendChild(restSpan);
      wrap.appendChild(titleEl);
      wrap.appendChild(spacerLine());
      appendBlock(wrap);
      renderTitle();
    }
    function renderTitle() {
      if (!brandSpan) return;
      if (engineState === "ready") {
        brandSpan.className = "accent"; brandSpan.textContent = "chDB";
        restSpan.className = "muted"; restSpan.textContent = chdbVersion ? (" v" + chdbVersion) : "";
      } else if (engineState === "error") {
        brandSpan.className = "accent"; brandSpan.textContent = "chDB SQL Shell";
        restSpan.className = "error-line"; restSpan.textContent = " — " + engineMsg;
      } else {
        brandSpan.className = "accent"; brandSpan.textContent = "chDB SQL Shell";
        restSpan.className = "muted";
        restSpan.textContent = " is initializing…" + (loadMiB ? " " + loadMiB : "");
      }
      scrollToBottom();
    }
    function engineFailed(msg) { engineState = "error"; engineMsg = msg; renderTitle(); }

    function hidePrompt() { inputRow.style.display = "none"; }
    function showPrompt() { inputRow.style.display = "flex"; autoResize(); focusInput(); }

    function echo(query) {
      var row = document.createElement("div");
      row.className = "input-row";
      var p = document.createElement("span");
      p.className = "prompt"; p.textContent = ":)";
      var q = document.createElement("span");
      q.className = "echo-block"; q.textContent = query;
      row.appendChild(p); row.appendChild(q);
      appendBlock(row);
    }

    // Boxed result (column name + type + separator + value rows).
    function buildBox(meta, rows) {
      var names = meta.map(function (m) { return m.name; });
      var types = meta.map(function (m) { return m.type; });
      function cell(v) { return v === null ? "NULL" : String(v); }
      var widths = meta.map(function (m, i) {
        var w = Math.max(names[i].length, types[i].length);
        for (var r = 0; r < rows.length; r++) { var s = cell(rows[r][i]); if (s.length > w) w = s.length; }
        return w + 2;
      });
      function bar(l, mid, r) { return l + widths.map(function (w) { return repeat("─", w); }).join(mid) + r; }
      function center(t, w) { var tot = w - t.length, le = Math.floor(tot / 2); return repeat(" ", le) + t + repeat(" ", tot - le); }
      function left(v, w) { return " " + v + repeat(" ", w - v.length - 1); }
      function plain(t) { var line = makeLine(); line.textContent = t; return line; }
      function styled(texts, cls) {
        var line = makeLine();
        line.appendChild(tn("│"));
        texts.forEach(function (t) {
          var s = document.createElement("span");
          s.className = cls; s.textContent = t;
          line.appendChild(s); line.appendChild(tn("│"));
        });
        return line;
      }

      var wrap = document.createElement("div");
      wrap.className = "result-table";
      wrap.appendChild(plain(bar("┌", "┬", "┐")));
      wrap.appendChild(styled(names.map(function (n, i) { return center(n, widths[i]); }), "col-name"));
      wrap.appendChild(styled(types.map(function (t, i) { return center(t, widths[i]); }), "col-type"));
      wrap.appendChild(plain(bar("├", "┼", "┤")));
      rows.forEach(function (row) {
        wrap.appendChild(styled(row.map(function (v, i) { return left(cell(v), widths[i]); }), "cell-value"));
      });
      wrap.appendChild(plain(bar("└", "┴", "┘")));
      return wrap;
    }

    function appendResult(j, res) {
      var meta = j.meta || [];
      var data = j.data || [];
      var totalRows = (j.rows != null) ? j.rows : data.length;
      var block = document.createElement("div");

      if (!meta.length) {
        var ok = makeLine("ok-line");
        ok.textContent = "OK.";
        block.appendChild(ok);
      } else {
        var shown = Math.min(data.length, MAX_ROWS);
        block.appendChild(buildBox(meta, data.slice(0, shown)));
        if (data.length > shown) {
          var trunc = makeLine("muted-line");
          trunc.textContent = "… showing first " + shown + " of " + data.length + " returned rows.";
          block.appendChild(trunc);
        }
        var elapsed = (res && typeof res.elapsedSeconds === "number") ? res.elapsedSeconds.toFixed(3) : "0.000";
        var foot = makeLine("muted-line");
        foot.textContent = totalRows + (totalRows === 1 ? " row" : " rows") + " in set. Elapsed: " + elapsed + " sec.";
        block.appendChild(foot);
      }
      block.appendChild(spacerLine());
      appendBlock(block);
    }

    // ---------- File registration (.files add / Import) ----------
    function openFilePicker() { filePicker.value = ""; filePicker.click(); }

    filePicker.addEventListener("change", async function () {
      var files = Array.prototype.slice.call(filePicker.files || []);
      filePicker.value = "";
      if (!files.length) return;
      if (!db) { printLine("Engine is still loading…", "muted-line"); return; }
      try {
        var block = document.createElement("div");
        for (var i = 0; i < files.length; i++) {
          var f = files[i];
          await db.registerFile(f.name, f);
          if (registered.indexOf(f.name) === -1) registered.push(f.name);
          var line = makeLine("reg-line");
          line.textContent = "Registered: " + f.name + " (" + f.size + " bytes)";
          block.appendChild(line);
        }
        block.appendChild(spacerLine());
        appendBlock(block);
      } catch (e) {
        printLine("registerFile failed: " + (e && e.message ? e.message : String(e)), "error-line");
      }
      if (engineState === "ready" && !busy) focusInput();
    });

    function listFiles() {
      if (!registered.length) {
        printLine("No files registered. Use Import or '.files add' to pick local file(s), then query them with file('<name>').", "muted-line");
        return;
      }
      var block = document.createElement("div");
      var head = makeLine("muted-line");
      head.textContent = "Registered files (query with file('<name>')):";
      block.appendChild(head);
      registered.forEach(function (n) {
        var line = makeLine("reg-line");
        line.textContent = "  • " + n;
        block.appendChild(line);
      });
      block.appendChild(spacerLine());
      appendBlock(block);
    }

    function handleCommand(cmd) {
      if (cmd === ".files add") { openFilePicker(); return; }
      if (cmd === ".files" || cmd === ".files list") { listFiles(); return; }
      printLine("Unknown command: " + cmd, "error-line");
    }

    // ---------- SQL execution (prompt hidden until the result is shown; no "running" line) ----------
    async function executeSql(buffer) {
      if (!conn) { printLine("Engine is still loading…", "muted-line"); return; }
      var stmts = buffer.split(";").map(function (s) { return s.trim(); }).filter(function (s) { return s.length > 0; });
      if (!stmts.length) return;
      busy = true;
      try {
        for (var i = 0; i < stmts.length; i++) {
          var isLast = (i === stmts.length - 1);
          var res = await conn.query(stmts[i], isLast ? "JSONCompact" : "Null");
          if (isLast) {
            var j = {};
            try { j = JSON.parse(res.text() || "{}"); } catch (e) {}
            appendResult(j, res);
          }
        }
      } catch (e) {
        printLine(e && e.message ? e.message : String(e), "error-line");
      } finally {
        busy = false;
      }
    }

    function submit(buffer) {
      echo(buffer);
      history.push(buffer);
      historyIndex = -1;
      draft = "";
      input.value = "";
      autoResize();
      var trimmed = buffer.trim();
      if (trimmed.charAt(0) === ".") {
        handleCommand(trimmed.replace(/;+\s*$/, "")); // dot-command: no ';' needed (tolerate a trailing one)
      } else {
        hidePrompt();
        executeSql(buffer).then(function () { if (engineState === "ready") showPrompt(); });
      }
    }

    // New: clear screen + history, close the current chDB connection, start a fresh one.
    async function newSession() {
      if (busy || !db || !conn) return;   // only after the engine is ready
      busy = true;
      history = []; historyIndex = -1; draft = "";
      registered = [];
      scrollback.innerHTML = "";
      input.value = ""; autoResize();
      hidePrompt();
      // Close + reopen the chDB connection on the SAME loaded engine — just API
      // calls into the wasm, so the engine is NOT re-downloaded or re-instantiated.
      try {
        await conn.close();
        try { await db.clearFiles(); } catch (e) {}
        conn = await db.connect();
        await applySafeSettings(conn);
      } catch (e) {
        printBanner();
        printLine("Failed to reset session: " + (e && e.message ? e.message : String(e)), "error-line");
        busy = false;
        showPrompt();
        return;
      }
      printBanner();   // engine already ready + version known -> "chDB v<version>"
      showPrompt();
      busy = false;
    }

    // ---------- Input + block caret ----------
    function focusInput() { input.focus(); positionCaret(); scrollToBottom(); }
    function autoResize() { input.style.height = "auto"; input.style.height = input.scrollHeight + "px"; }

    // Draw the block caret at the true cursor position using a measuring mirror.
    function positionCaret() {
      if (document.activeElement !== input || input.selectionStart !== input.selectionEnd) {
        blockCaret.classList.add("hide");
        return;
      }
      var pos = (input.selectionStart == null) ? input.value.length : input.selectionStart;
      taMirror.textContent = input.value.slice(0, pos);
      var marker = document.createElement("span");
      marker.textContent = "\u200b";
      taMirror.appendChild(marker);
      var lh = parseFloat(getComputedStyle(input).lineHeight) || 20;
      var ch = blockCaret.offsetHeight || 16;
      blockCaret.style.left = marker.offsetLeft + "px";
      blockCaret.style.top = (marker.offsetTop + Math.max(0, (lh - ch) / 2)) + "px";
      blockCaret.classList.remove("hide");
      blockCaret.style.animation = "none"; void blockCaret.offsetWidth; blockCaret.style.animation = "";
    }

    function moveCaretToEnd() {
      window.requestAnimationFrame(function () {
        var len = input.value.length;
        try { input.setSelectionRange(len, len); } catch (e) {}
        autoResize(); positionCaret(); scrollToBottom();
      });
    }

    // Drop an example query into the prompt; it ends with ';', so pressing Enter runs it.
    function fillInput(sql) {
      if (engineState !== "ready") return;
      input.value = sql;
      draft = sql;
      historyIndex = -1;
      focusInput();
      moveCaretToEnd();
    }
    function readyToRun(v) { return /;\s*$/.test(v); }

    input.addEventListener("input", function () {
      historyIndex = -1;
      draft = input.value;
      autoResize();
      positionCaret();
      scrollToBottom();
    });
    input.addEventListener("keyup", positionCaret);
    input.addEventListener("select", positionCaret);
    // Real-time caret tracking: fires on every caret move (arrow keys / Home / End,
    // including key auto-repeat) — not only on keyup.
    document.addEventListener("selectionchange", function () { if (document.activeElement === input) positionCaret(); });
    input.addEventListener("click", function () { window.requestAnimationFrame(positionCaret); });
    input.addEventListener("focus", positionCaret);
    input.addEventListener("blur", function () { blockCaret.classList.add("hide"); });
    window.addEventListener("resize", positionCaret);

    input.addEventListener("keydown", function (e) {
      if (e.key === "Enter") {
        if (e.shiftKey) return;
        var v = input.value;
        var t = v.trim();
        if (t === "") { e.preventDefault(); echo(""); input.value = ""; autoResize(); positionCaret(); return; }
        if (t.charAt(0) === ".") { e.preventDefault(); submit(v); return; }
        if (readyToRun(v)) { e.preventDefault(); submit(v); return; }
        return;
      }
      if (e.key === "ArrowUp") {
        var vu = input.value, pu = input.selectionStart;
        if (vu.slice(0, pu).indexOf("\n") !== -1 || history.length === 0) return;
        e.preventDefault();
        if (historyIndex === -1) { draft = vu; historyIndex = history.length - 1; }
        else if (historyIndex > 0) historyIndex--;
        input.value = history[historyIndex];
        moveCaretToEnd();
        return;
      }
      if (e.key === "ArrowDown") {
        var vd = input.value, pd = input.selectionStart;
        if (vd.slice(pd).indexOf("\n") !== -1 || historyIndex === -1) return;
        e.preventDefault();
        if (historyIndex < history.length - 1) { historyIndex++; input.value = history[historyIndex]; }
        else { historyIndex = -1; input.value = draft; }
        moveCaretToEnd();
        return;
      }
    });

    // Click focuses the input ONLY when nothing is selected, so terminal text
    // (and the input itself) stays selectable / copyable.
    terminal.addEventListener("click", function () {
      var sel = window.getSelection();
      if (sel && !sel.isCollapsed) return;
      if (inputRow.style.display !== "none") focusInput();
    });

    btnNew.addEventListener("click", newSession);
    btnImport.addEventListener("click", function () { echo(".files add"); openFilePicker(); });

    // ---------- Examples dropdown ----------
    // Click an item to drop the query into the prompt (it ends with ';', so Enter runs it).
    var EXAMPLES = [
      { group: "Local", label: "Version", sql: "SELECT version();" },
      { group: "Local", label: "Generated rows", sql: "SELECT number, number * number AS square FROM numbers(10);" },
      { group: "Remote files", label: "TSV via url()", sql: "SELECT * FROM url('https://datasets-documentation.s3.eu-west-3.amazonaws.com/nyc-taxi/trips_0.gz', 'TabSeparatedWithNames') LIMIT 10;" },
      { group: "Remote files", label: "TSV via s3()", sql: "SELECT * FROM s3('https://datasets-documentation.s3.eu-west-3.amazonaws.com/nyc-taxi/trips_0.gz', NOSIGN, 'TabSeparatedWithNames') LIMIT 10;" },
      { group: "Remote files", label: "Parquet via url()", sql: "SELECT * FROM url('https://datasets-documentation.s3.eu-west-3.amazonaws.com/house_parquet/house_0.parquet') LIMIT 10;" }
    ];
    function openExamples() { examplesMenu.classList.remove("hide"); btnExamples.setAttribute("aria-expanded", "true"); }
    function closeExamples() { examplesMenu.classList.add("hide"); btnExamples.setAttribute("aria-expanded", "false"); }
    var exLastGroup = "";
    EXAMPLES.forEach(function (ex) {
      if (ex.group !== exLastGroup) {
        var g = document.createElement("div");
        g.className = "ex-group";
        g.textContent = ex.group;
        examplesMenu.appendChild(g);
        exLastGroup = ex.group;
      }
      var item = document.createElement("button");
      item.type = "button";
      item.className = "example-item";
      item.title = ex.sql;
      var t = document.createElement("span"); t.className = "ex-title"; t.textContent = ex.label;
      var c = document.createElement("span"); c.className = "ex-sql"; c.textContent = ex.sql;
      item.appendChild(t); item.appendChild(c);
      item.addEventListener("click", function () { closeExamples(); fillInput(ex.sql); });
      examplesMenu.appendChild(item);
    });
    btnExamples.addEventListener("click", function (e) {
      e.stopPropagation();
      if (examplesMenu.classList.contains("hide")) openExamples(); else closeExamples();
    });
    examplesMenu.addEventListener("click", function (e) { e.stopPropagation(); });
    document.addEventListener("click", closeExamples);
    document.addEventListener("keydown", function (e) { if (e.key === "Escape") closeExamples(); });

    // ---------- Engine connect / boot ----------
    // On wasm the pthread pool is small + strict; ClickHouse otherwise fans out many
    // helper threads (download / parsing / prefetch / parallel formatting) by core count
    // and exhausts it ("Cannot schedule a task"). Pin every such knob to a safe minimum
    // on each fresh connection (session-level; verified against this engine version).
    // mt: a small, pool-safe amount of parallelism (verified not to exhaust the 16-worker pool).
    // st: the build has NO -pthread, so any helper thread errors ("thread creation unavailable" —
    // e.g. the Parquet decoder pool). Keep everything single-threaded / inline on st.
    var MT_SETTINGS = "SET max_threads=2, max_download_threads=2, max_parsing_threads=2, max_final_threads=2, max_insert_threads=2, input_format_parallel_parsing=1, output_format_parallel_formatting=0, input_format_parquet_enable_row_group_prefetch=0, output_format_parquet_parallel_encoding=0, output_format_arrow_parallel_encoding=0, allow_prefetched_read_pool_for_remote_filesystem=0, remote_filesystem_read_prefetch=0";
    var ST_SETTINGS = "SET max_threads=1, max_download_threads=1, max_parsing_threads=1, max_final_threads=1, max_insert_threads=1, input_format_parallel_parsing=0, output_format_parallel_formatting=0, input_format_parquet_enable_row_group_prefetch=0, output_format_parquet_parallel_encoding=0, output_format_arrow_parallel_encoding=0, allow_prefetched_read_pool_for_remote_filesystem=0, remote_filesystem_read_prefetch=0";
    async function applySafeSettings(c) { try { await c.query(bundleVariant === "st" ? ST_SETTINGS : MT_SETTINGS, "Null"); } catch (e) {} }

    async function connect() {
      busy = true;
      try {
        var bundle = selectBundle({ baseUrl: new URL("./dist", import.meta.url).href });
        bundleVariant = bundle.variant;
        if (!bundle.supported) {
          engineFailed("chDB cannot run here: " + (bundle.reasons || []).join("; "));
          return;
        }
        db = await AsyncChdb.create({
          moduleUrl: bundle.moduleUrl,
          wasmUrl: bundle.wasmUrl,
          onProgress: function (loaded, total) {
            // Live count of how much of the wasm has downloaded so far, in MiB.
            loadMiB = (loaded / 1048576).toFixed(1) + " MiB";
            renderTitle();
          },
        });
        conn = await db.connect();   // open the in-memory connection (one-time wasm load already done)
        await applySafeSettings(conn);
        try {
          var vr = await conn.query("SELECT version()", "JSONCompact");
          var vj = JSON.parse(vr.text() || "{}");
          if (vj.data && vj.data[0] && vj.data[0][0] != null) chdbVersion = String(vj.data[0][0]);
        } catch (e) {}
        engineState = "ready";
        renderTitle();
        showPrompt();
      } catch (e) {
        engineFailed("Failed to initialize chDB: " + (e && e.message ? e.message : String(e)));
      } finally {
        busy = false;
      }
    }

    printBanner();   // prompt stays hidden until the engine is ready
    connect();
  </script>
</body>
</html>
