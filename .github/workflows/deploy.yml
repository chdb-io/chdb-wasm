name: Deploy wasm shell to Cloudflare

# Manual-only. This workflow NEVER runs automatically — not on push, pull_request,
# merge, or tag. It runs only when triggered by hand (workflow_dispatch).
#
# It does NOT build the engine from source: the chdb-wasm engine (glue JS + the two
# .wasm bundles) is pulled from the LATEST published `chdb-wasm` npm package. It then
# assembles the browser shell (web/) + engine and deploys to Cloudflare: Pages for the
# small files, R2 for the large .wasm.
on:
  workflow_dispatch:

permissions:
  contents: read

env:
  NODE_VERSION: '24'

jobs:
  deploy:
    runs-on: [self-hosted, linux, x64, ubuntu-latest]
    timeout-minutes: 30
    # Required repo secrets (deploy fails fast if any is missing):
    #   CLOUDFLARE_API_TOKEN  — Cloudflare Pages: Edit + Workers R2 Storage: Edit
    #   CLOUDFLARE_ACCOUNT_ID — the Cloudflare account id
    #   PAGES_PROJECT         — Cloudflare Pages project name
    #   R2_BUCKET             — R2 bucket name (bound to the Pages project as WASM_BUCKET)
    # The Pages project must already exist with the WASM_BUCKET R2 binding and the
    # custom domain (wasm.chdb.io) — configured once, in the dashboard.
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      PAGES_PROJECT: ${{ secrets.PAGES_PROJECT }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
    steps:
      - name: Check required secrets
        run: |
          : "${CLOUDFLARE_API_TOKEN:?set the CLOUDFLARE_API_TOKEN repo secret}"
          : "${CLOUDFLARE_ACCOUNT_ID:?set the CLOUDFLARE_ACCOUNT_ID repo secret}"
          : "${PAGES_PROJECT:?set the PAGES_PROJECT repo secret}"
          : "${R2_BUCKET:?set the R2_BUCKET repo secret}"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Fetch the latest chdb-wasm engine from npm
        run: |
          npm install --no-audit --no-fund --no-save chdb-wasm@latest
          ls -la node_modules/chdb-wasm/dist/chdb.wasm node_modules/chdb-wasm/dist/st/chdb.wasm

      - name: Assemble the Cloudflare bundle (pages/ + r2/)
        run: bash scripts/build-cf-bundle.sh node_modules/chdb-wasm/dist web out

      - name: Upload wasm to R2
        run: |
          set -eux
          cd out/r2
          find . -name '*.wasm' | sed 's#^\./##' | while read -r key; do
            npx --yes wrangler r2 object put "${R2_BUCKET}/$key" \
              --file "$key" --content-type application/wasm --remote
          done

      - name: Deploy Pages
        run: npx --yes wrangler pages deploy out/pages --project-name "${PAGES_PROJECT}"
